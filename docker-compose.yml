services:
  mongo:
    image: mongo:7
    container_name: frigo-mania-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: frigo-mania
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
